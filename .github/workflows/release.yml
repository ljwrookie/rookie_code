name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Bump CLI version
        id: bump_cli
        working-directory: packages/cli
        run: |
          npm version patch --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish CLI to npm
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Bump VS Code Extension version
        id: bump_vscode
        working-directory: packages/vscode-extension
        run: |
          npm version patch --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish VS Code Extension to Open VSX
        working-directory: packages/vscode-extension
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: |
          npm i -g ovsx
          ovsx publish -p "$OVSX_TOKEN"

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json packages/vscode-extension/package.json
          git commit -m "chore(release): bump cli@${{ steps.bump_cli.outputs.version }} + vscode@${{ steps.bump_vscode.outputs.version }}"
          git push
