<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1B26" />
      <stop offset="100%" stop-color="#24283B" />
    </linearGradient>

    <!-- Logo Icon Gradient -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7AA2F7" />
      <stop offset="100%" stop-color="#BB9AF7" />
    </linearGradient>

    <!-- Drop Shadow for Icon -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background (Optional, typically GitHub logos have transparent bg, but a subtle dark theme banner is nice) -->
  <rect width="800" height="200" rx="16" fill="url(#bgGradient)" />

  <!-- Robot / Code Icon -->
  <g transform="translate(100, 50)" filter="url(#shadow)">
    <!-- Hexagon base -->
    <path d="M 50 5 L 90 25 L 90 75 L 50 95 L 10 75 L 10 25 Z" fill="url(#iconGradient)" opacity="0.1" />
    <path d="M 50 5 L 90 25 L 90 75 L 50 95 L 10 75 L 10 25 Z" fill="none" stroke="url(#iconGradient)" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Eyes -->
    <circle cx="35" cy="45" r="5" fill="#FFFFFF" />
    <circle cx="65" cy="45" r="5" fill="#FFFFFF" />
    
    <!-- Code bracket mouth -->
    <path d="M 35 65 L 45 75 L 35 85 M 65 65 L 55 75 L 65 85" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Text: Rookie Code -->
  <text x="240" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Rookie Code</text>
  
  <!-- Subtitle -->
  <text x="245" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#A9B1D6" letter-spacing="1">CLI-BASED AI CODE AGENT WITH LONG-TERM MEMORY</text>
</svg>
