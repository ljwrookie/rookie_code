<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 360"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  aria-label="Rookie Code"
>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1020" />
      <stop offset="55%" stop-color="#1B1F3A" />
      <stop offset="100%" stop-color="#241B3B" />
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7AA2F7" />
      <stop offset="100%" stop-color="#BB9AF7" />
    </linearGradient>
  </defs>

  <!-- Safe padded banner: leave enough space to avoid any renderer clipping -->
  <rect x="24" y="24" width="1152" height="312" rx="44" fill="url(#bg)" />

  <!-- Mark: code brackets inside a rounded square -->
  <g transform="translate(96 96)">
    <rect x="0" y="0" width="168" height="168" rx="40" fill="rgba(255,255,255,0.06)" stroke="url(#accent)" stroke-width="6" />

    <!-- left bracket -->
    <path
      d="M72 52 L44 84 L72 116"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- right bracket -->
    <path
      d="M96 52 L124 84 L96 116"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- slash -->
    <path
      d="M86 50 L82 118"
      fill="none"
      stroke="url(#accent)"
      stroke-width="8"
      stroke-linecap="round"
    />
  </g>

  <!-- Title -->
  <text
    x="312"
    y="188"
    font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial"
    font-size="84"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="-1"
  >Rookie Code</text>

  <!-- Subtitle -->
  <text
    x="316"
    y="246"
    font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial"
    font-size="22"
    font-weight="600"
    fill="#A9B1D6"
    letter-spacing="1.2"
  >CLI AI CODE AGENT · TOOLS · SKILLS · MCP</text>

  <!-- Accent line -->
  <rect x="316" y="266" width="560" height="6" rx="3" fill="url(#accent)" opacity="0.9" />
</svg>
