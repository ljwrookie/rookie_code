<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="12" y1="6" x2="52" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050A0E" />
      <stop offset="1" stop-color="#0A1018" />
    </linearGradient>
    <linearGradient id="accent" x1="14" y1="20" x2="50" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00FF88" />
      <stop offset="1" stop-color="#00D4FF" />
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" />
  <rect x="4.5" y="4.5" width="55" height="55" rx="13.5" stroke="rgba(255,255,255,0.06)" />

  <!-- Terminal window -->
  <rect x="14" y="14" width="36" height="36" rx="10" fill="#0A1018" stroke="#1A2A3A" />
  <path d="M24 24h16" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" />

  <!-- Window dots -->
  <circle cx="20.5" cy="20.5" r="1.6" fill="#1A2A3A" />
  <circle cx="25.5" cy="20.5" r="1.6" fill="#1A2A3A" />
  <circle cx="30.5" cy="20.5" r="1.6" fill="#1A2A3A" />

  <!-- Prompt: > _ -->
  <path d="M23 31l5 3.5-5 3.5" stroke="#00FF88" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="31.5" y="36.5" width="9" height="2.8" rx="1.4" fill="#00D4FF" />
</svg>
